name: Daily Funding Report

on:
  schedule:
    # 每天北京时间前一天 07:00 触发（UTC 23:00）
    - cron: '0 23 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  trigger-funding-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Funding Report
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            "https://phonebook-xf5yjzed.manus.space/api/funding-cron?key=${{ secrets.FUNDING_CRON_SECRET }}" \
            -d '{}' \
            -v

      - name: Wait for task completion
        run: sleep 10

      - name: Verify completion
        run: |
          echo "Funding report task triggered successfully"
